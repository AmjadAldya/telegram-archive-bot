name: Deploy to DigitalOcean

# Manual only — click "Run workflow" in the Actions tab to deploy the
# current main branch to the droplet. Never runs automatically on push.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            set -e
            cd "${{ secrets.DO_APP_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose build
            docker compose run --rm mirror alembic upgrade head
            docker compose up -d
            docker image prune -f
